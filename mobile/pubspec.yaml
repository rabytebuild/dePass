name: depass_mobile
description: GatePassX mobile scanner and organizer app.
publish_to: none
version: 0.1.0+1
environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0 <3.45.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  provider: ^6.1.5+1
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.3.0
  intl: ^0.20.2
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
