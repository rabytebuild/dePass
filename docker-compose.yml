version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gatepassx-mysql
    environment:
      MYSQL_ROOT_PASSWORD: gatepassx2026
      MYSQL_DATABASE: gatepassx
      MYSQL_USER: gatepassx
      MYSQL_PASSWORD: gatepassx2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile.dev
    container_name: gatepassx-laravel
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: gatepassx
      DB_USERNAME: gatepassx
      DB_PASSWORD: gatepassx2026
      SANCTUM_STATEFUL_DOMAINS: "localhost:3000,localhost:5173,127.0.0.1:3000,127.0.0.1:5173"
      SESSION_DOMAIN: localhost
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./laravel:/var/www/html
      - /var/www/html/vendor
    command: >
      sh -c "php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  mysql_data: