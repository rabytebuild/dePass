name: GatePassX CI Automation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/test-automation.yml
  pull_request:
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/test-automation.yml

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"
  FLUTTER_VERSION: "3.29.2"

jobs:
  laravel-api-tests:
    name: Laravel API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, openssl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Validate composer
        run: composer validate --strict

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Migrate & seed
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate:fresh --seed --force

      - name: Validate API routes
        env:
          XDEBUG_MODE: off
        run: php artisan route:list --path=api

      - name: Build Laravel frontend
        run: |
          npm ci
          npm run build

      - name: Run Laravel test suite
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      - name: Upload logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: laravel-ci-logs
          path: |
            backend/storage/logs/laravel.log
          if-no-files-found: ignore

  laravel-smoke-test:
    name: Laravel HTTP Smoke Test
    runs-on: ubuntu-latest
    needs: laravel-api-tests
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, openssl
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Build test DB
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate:fresh --seed --force

      - name: Start Laravel server
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > ../laravel-server.log 2>&1 &
          echo $! > ../laravel-server.pid
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/up >/dev/null 2>&1; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          cat ../laravel-server.log
          exit 1

      - name: Run API smoke tests
        run: |
          python3 - <<'PY'
          import json, sys, urllib.error, urllib.parse, urllib.request, uuid

          BASE = "http://127.0.0.1:8000/api"

          def req(method, path, token=None, payload=None, expected=200):
              data = None
              hdrs = {"Accept": "application/json"}
              if payload is not None:
                  data = json.dumps(payload).encode()
                  hdrs["Content-Type"] = "application/json"
              if token:
                  hdrs["Authorization"] = f"Bearer {token}"
              r = urllib.request.Request(f"{BASE}{path}", data=data, headers=hdrs, method=method)
              try:
                  with urllib.request.urlopen(r, timeout=20) as resp:
                      body, status = resp.read().decode(), resp.status
              except urllib.error.HTTPError as e:
                  body, status = e.read().decode(), e.code
              if status != expected:
                  print(f"FAIL {method} {path}: expected {expected}, got {status}")
                  print(body)
                  sys.exit(1)
              return json.loads(body) if body else {}

          # 1. Admin login (no device required for super_admin)
          admin = req("POST", "/login", payload={"username": "admin", "password": "password123"})
          admin_token = admin["token"]
          print(f"1. Admin login: OK (token={admin_token[:16]}...)")

          # 2. Get current user
          me = req("GET", "/me", token=admin_token)
          assert me["username"] == "admin"
          print(f"2. GET /me: OK ({me['username']})")

          # 3. List events
          events = req("GET", "/events", token=admin_token)
          assert len(events["data"]) > 0
          event_id = events["data"][0]["id"]
          print(f"3. GET /events: OK ({len(events['data'])} events)")

          # 4. List pass types
          pts = req("GET", f"/events/{event_id}/pass-types", token=admin_token)
          assert len(pts["data"]) > 0
          pt_id = pts["data"][0]["id"]
          print(f"4. GET /events/{event_id}/pass-types: OK")

          # 5. Create single pass
          p = req("POST", f"/events/{event_id}/passes", token=admin_token,
                  payload={"pass_type_id": pt_id, "attendee_name": "Test User"},
                  expected=201)
          assert p["qr_data"].startswith("GPX1|"), p
          print(f"5. POST /events/{event_id}/passes: OK (qr={p['qr_data'][:20]}...)")

          # 6. List passes
          passes = req("GET", f"/events/{event_id}/passes", token=admin_token)
          assert len(passes["data"]) > 0
          print(f"6. GET /events/{event_id}/passes: OK ({len(passes['data'])} passes)")

          # 7. Register device
          dev_uuid = str(uuid.uuid4())
          dev = req("POST", "/devices", token=admin_token,
                    payload={"uuid": dev_uuid, "device_fingerprint": "smoke-test"},
                    expected=201)
          dev_id = dev["device"]["id"]
          print(f"7. POST /devices: OK (id={dev_id})")

          # 8. Approve device
          req("POST", f"/devices/{dev_id}/approve", token=admin_token)
          print(f"8. POST /devices/{dev_id}/approve: OK")

          # 9. Get event package
          pkg = req("GET", f"/events/{event_id}/package?device_uuid={dev_uuid}", token=admin_token)
          assert "event_package" in pkg
          print(f"9. GET /events/{event_id}/package: OK (format={pkg['format']})")

          # 10. Validate pass QR
          val = req("POST", "/validate-pass", payload={"qr_data": p["qr_data"]})
          assert val["valid"] is True
          print(f"10. POST /validate-pass: OK (valid={val['valid']})")

          # 11. Get stats
          stats = req("GET", "/stats", token=admin_token)
          assert "events" in stats
          print(f"11. GET /stats: OK ({stats})")

          # 12. List users
          users = req("GET", "/users", token=admin_token)
          assert len(users["data"]) > 0
          print(f"12. GET /users: OK ({len(users['data'])} users)")

          # 13. List organizations
          orgs = req("GET", "/organizations", token=admin_token)
          assert len(orgs["data"]) > 0
          print(f"13. GET /organizations: OK ({len(orgs['data'])} orgs)")

          # 14. List devices
          devices = req("GET", "/devices", token=admin_token)
          print(f"14. GET /devices: OK ({len(devices['data'])} devices)")

          # 15. List scans
          scans = req("GET", "/scans", token=admin_token)
          print(f"15. GET /scans: OK ({len(scans['data'])} scans)")

          # 16. Get scanner settings
          settings = req("GET", "/scanner/settings", token=admin_token)
          print(f"16. GET /scanner/settings: OK")

          # 17. Device registration status
          status = req("POST", "/device-registration/status",
                       payload={"uuid": dev_uuid})
          print(f"17. POST /device-registration/status: OK")

          # 18. Bulk generate passes
          bulk = req("POST", f"/events/{event_id}/passes/bulk-generate", token=admin_token,
                     payload={"count": 5, "prefix": "BULK-"}, expected=201)
          print(f"18. POST /events/{event_id}/passes/bulk-generate: OK")

          # 19. Lock event
          req("PUT", f"/events/{event_id}/lock", token=admin_token)
          print(f"19. PUT /events/{event_id}/lock: OK")

          # 20. Get dashboard stats
          dash = req("GET", "/admin/dashboard", token=admin_token)
          print(f"20. GET /admin/dashboard: OK")

          # 21. Refresh token
          ref = req("POST", "/refresh", token=admin_token)
          print(f"21. POST /refresh: OK (new token={ref['token'][:16]}...)")

          # 22. Logout
          req("POST", "/logout", token=admin_token)
          print(f"22. POST /logout: OK")

          # 23. Organizer login (needs device registration flow)
          reg = req("POST", "/device-registration",
                    payload={"uuid": dev_uuid, "username": "organizer1",
                             "device_fingerprint": "ci-smoke-device"},
                    expected=201)
          print(f"23. POST /device-registration: OK (device_id={reg['device']['id']})")

          req("POST", f"/devices/{reg['device']['id']}/approve", token=admin_token)
          org_login = req("POST", "/login",
                          payload={"username": "organizer1", "password": "password123",
                                   "device_uuid": dev_uuid})
          org_token = org_login["token"]
          assert org_login["user"]["role"] != "super_admin"
          print(f"24. Organizer login: OK (role={org_login['user']['role']})")

          # 25. Organizer access scoped
          org_events = req("GET", "/events", token=org_token)
          print(f"25. Organizer events: OK ({len(org_events['data'])} events)")

          # 26. System configurations
          configs = req("GET", "/configurations", token=admin_token)
          print(f"26. GET /configurations: OK ({len(configs['data'])} configs)")

          print("\n=== ALL 26 SMOKE TESTS PASSED ===")
          PY

      - name: Stop Laravel server
        if: ${{ always() }}
        run: |
          if [ -f ../laravel-server.pid ]; then
            kill "$(cat ../laravel-server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: laravel-smoke-log
          path: laravel-server.log
          if-no-files-found: ignore

  flutter-analyze:
    name: Flutter Analysis
    runs-on: ubuntu-latest
    needs: laravel-api-tests
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('mobile/pubspec.yaml') }}
          restore-keys: flutter-${{ runner.os }}-

      - name: Generate platform files
        run: flutter create --platforms=android --project-name depass_mobile --org com.devnbugs . 2>&1

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No tests directory found"
          fi
