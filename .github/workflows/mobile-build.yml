name: One-Click Mobile Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Android artifact to build
        required: true
        default: apk
        type: choice
        options:
          - apk
          - appbundle
          - both
  push:
    branches:
      - main
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/mobile-build.yml
  pull_request:
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/mobile-build.yml

jobs:
  laravel-tests:
    name: Laravel Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate:fresh --seed --force

      - name: Run Laravel tests
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: laravel-tests
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android runner
        run: flutter create --platforms=android --project-name depass_mobile --org com.gatepassx .

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Run Flutter tests when present
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No Flutter test directory found; skipping flutter test."
          fi

      - name: Build Android APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        run: flutter build apk --release

      - name: Build Android App Bundle
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.build_type == 'appbundle' || inputs.build_type == 'both') }}
        run: flutter build appbundle --release

      - name: Upload APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: depass-mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.build_type == 'appbundle' || inputs.build_type == 'both') }}
        uses: actions/upload-artifact@v4
        with:
          name: depass-mobile-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
