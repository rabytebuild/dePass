name: GatePassX Mobile Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Android artifact to build
        required: true
        default: apk
        type: choice
        options:
          - apk
          - appbundle
          - both
  push:
    branches:
      - main
      - develop
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/mobile-build.yml
  pull_request:
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/mobile-build.yml

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  FLUTTER_VERSION: "3.29.2"

jobs:
  laravel-tests:
    name: Laravel Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations & seed
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate:fresh --seed --force

      - name: Run Laravel tests
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  android-build:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: laravel-tests
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('mobile/pubspec.yaml') }}
          restore-keys: flutter-${{ runner.os }}-

      - name: Show Flutter environment
        run: |
          flutter --version
          dart --version
          flutter doctor -v

      - name: Generate Android platform
        run: |
          flutter create --platforms=android --project-name depass_mobile --org com.devnbugs . 2>&1

      - name: Pin Android SDK levels
        run: |
          python3 - <<'PY'
          from pathlib import Path

          sdk_levels = {
              "flutter.compileSdkVersion": "36",
              "flutter.targetSdkVersion": "36",
              "flutter.minSdkVersion": "28",
          }

          def rewrite_key_value_file(p):
              if not p.exists():
                  return
              lines = p.read_text().splitlines()
              rewritten, seen = [], set()
              for line in lines:
                  s = line.lstrip()
                  if "=" in line and not s.startswith("#"):
                      k, v = line.split("=", 1)
                      k = k.strip()
                      if k in sdk_levels:
                          rewritten.append(f"{k}={sdk_levels[k]}")
                          seen.add(k)
                          continue
                  rewritten.append(line)
              for k, v in sdk_levels.items():
                  if k not in seen:
                      rewritten.append(f"{k}={v}")
              p.write_text("\n".join(rewritten) + "\n")

          rewrite_key_value_file(Path("android/local.properties"))
          rewrite_key_value_file(Path("android/gradle.properties"))
          PY

      - name: Fix AndroidManifest permissions
        run: |
          manifest="android/app/src/main/AndroidManifest.xml"
          if [ -f "$manifest" ]; then
            if ! grep -q "android.permission.CAMERA" "$manifest"; then
              sed -i 's|<uses-permission android:name="android.permission.FLASHLIGHT"/>|&\n    <uses-permission android:name="android.permission.CAMERA"/>|' "$manifest"
            fi
          fi

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate launcher icons
        continue-on-error: true
        run: flutter pub run flutter_launcher_icons -f flutter_launcher_icons.yaml 2>&1 || true

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Build Android split APKs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        run: flutter build apk --release --split-per-abi

      - name: Build Android App Bundle
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.build_type == 'appbundle' || inputs.build_type == 'both') }}
        run: flutter build appbundle --release

      - name: Build Laravel frontend assets
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Prepare release artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob

          release_dir="../release"
          laravel_staging="${release_dir}/laravel-shared-hosting"
          laravel_zip="${release_dir}/gatepassx-laravel-${GITHUB_RUN_NUMBER}.zip"
          apk_prefix="${release_dir}/gatepassx-mobile-${GITHUB_RUN_NUMBER}"

          rm -rf "${release_dir}"
          mkdir -p "${laravel_staging}"

          # Copy APKs
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi="$(basename "${apk}" .apk | sed 's/^app-//; s/-release$//')"
            cp "${apk}" "${apk_prefix}-${abi}.apk"
          done

          # Stage Laravel
          cp -a ../backend/. "${laravel_staging}/"

          # Remove dev artifacts
          rm -rf \
            "${laravel_staging}/.env" \
            "${laravel_staging}/.phpunit.result.cache" \
            "${laravel_staging}/database/database.sqlite" \
            "${laravel_staging}/vendor" \
            "${laravel_staging}/node_modules" \
            "${laravel_staging}/storage/framework/cache/data/"* \
            "${laravel_staging}/storage/framework/testing/"* \
            "${laravel_staging}/storage/framework/views/"*.php \
            "${laravel_staging}/storage/logs/"*.log

          # Verify built assets exist
          test -f "${laravel_staging}/public/build/manifest.json"

          # Create root index.php for shared hosting
          cat > "${laravel_staging}/index.php" <<'PHP'
          <?php
          use Illuminate\Foundation\Application;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists($maintenance = __DIR__.'/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          require __DIR__.'/vendor/autoload.php';

          $app = require_once __DIR__.'/bootstrap/app.php';
          $app->handleRequest(Request::capture());
          PHP

          # Create .htaccess
          cat > "${laravel_staging}/.htaccess" <<'HTACCESS'
          <IfModule mod_rewrite.c>
              <IfModule mod_negotiation.c>
                  Options -MultiViews -Indexes
              </IfModule>

              RewriteEngine On

              RewriteRule ^(?:app|bootstrap|config|database|resources|routes|storage|tests|vendor)(?:/|$) - [F,L]
              RewriteRule ^(?:artisan|composer\.(?:json|lock)|package(?:-lock)?\.json|phpunit\.xml|vite\.config\.js)$ - [F,L]

              RewriteCond %{HTTP:Authorization} .
              RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

              RewriteCond %{HTTP:x-xsrf-token} .
              RewriteRule .* - [E=HTTP_X_XSRF_TOKEN:%{HTTP:X-XSRF-Token}]

              RewriteCond %{DOCUMENT_ROOT}/public%{REQUEST_URI} -f [OR]
              RewriteCond %{DOCUMENT_ROOT}/public%{REQUEST_URI} -d
              RewriteRule ^(.*)$ public/$1 [L]

              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteCond %{REQUEST_URI} (.+)/$
              RewriteRule ^ %1 [L,R=301]

              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteRule ^ index.php [L]
          </IfModule>

          <FilesMatch "^\.">
              Require all denied
          </FilesMatch>
          HTACCESS

          # Create zip
          (cd "${laravel_staging}" && zip -qr "../$(basename "${laravel_zip}")" .)

      - name: Debug failed Flutter build
        if: ${{ failure() }}
        run: |
          echo "=== Flutter diagnostics ==="
          flutter --version || true
          dart --version || true
          flutter doctor -v || true
          echo "=== pubspec.yaml ==="
          head -80 pubspec.yaml || true
          echo "=== Dependencies ==="
          dart pub deps || true
          echo "=== Android outputs ==="
          find build/app/outputs -maxdepth 5 -type f 2>/dev/null | sort || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gatepassx-mobile-apks
          path: mobile/build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Upload Laravel shared-hosting zip
        uses: actions/upload-artifact@v4
        with:
          name: gatepassx-laravel-shared-hosting
          path: release/gatepassx-laravel-${{ github.run_number }}.zip
          if-no-files-found: error

      - name: Upload App Bundle
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.build_type == 'appbundle' || inputs.build_type == 'both') }}
        uses: actions/upload-artifact@v4
        with:
          name: gatepassx-mobile-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.build_type == 'apk' || inputs.build_type == 'both') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: GatePassX Release v${{ github.run_number }}
          body: |
            ## GatePassX Release v${{ github.run_number }}

            ### ✅ What's included
            - Android release APKs (split per ABI)
            - Laravel shared-hosting deployment zip
            - Fully tested API with CI pipeline

            ### 📱 Mobile
            - Package: `com.devnbugs.gatepassx`
            - Built with Flutter

            ### 🏗️ Backend
            - Laravel with Sanctum auth
            - SQLite (dev) / MySQL (prod)
            - Ready for shared hosting deployment
          files: |
            release/gatepassx-mobile-${{ github.run_number }}-*.apk
            release/gatepassx-laravel-${{ github.run_number }}.zip
