name: Turbo Mobile Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Android artifact to build
        required: true
        default: apk
        type: choice
        options:
          - apk
          - appbundle
          - both
  push:
    branches:
      - main
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/mobile-build.yml
  pull_request:
    paths:
      - backend/**
      - mobile/**
      - .github/workflows/mobile-build.yml

permissions:
  contents: write

concurrency:
  group: turbo-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel-tests:
    name: Laravel Seeded API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate:fresh --seed --force

      - name: Run Laravel tests
        env:
          XDEBUG_MODE: off
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  android-build:
    name: Android Turbo Build
    runs-on: ubuntu-latest
    needs: laravel-tests
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('mobile/pubspec.yaml') }}
          restore-keys: flutter-${{ runner.os }}-

      - name: Show Flutter environment
        run: |
          flutter --version
          dart --version
          flutter doctor -v

      - name: Generate Android runner
        run: |
          set -o pipefail
          flutter create --platforms=android --project-name depass_mobile --org com.gatepassx . 2>&1 | tee ../flutter-create.log

      - name: Install Flutter dependencies
        run: |
          set -o pipefail
          flutter pub get 2>&1 | tee ../flutter-pub-get.log

      - name: Analyze Flutter code
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee ../flutter-analyze.log

      - name: Run Flutter tests when present
        run: |
          set -o pipefail
          if [ -d test ]; then
            flutter test 2>&1 | tee ../flutter-test.log
          else
            echo "No Flutter test directory found; skipping flutter test."
          fi

      - name: Build Android split APKs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        run: |
          set -o pipefail
          flutter build apk --release --split-per-abi 2>&1 | tee ../flutter-build-apk.log

      - name: Build Android App Bundle
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.build_type == 'appbundle' || inputs.build_type == 'both') }}
        run: |
          set -o pipefail
          flutter build appbundle --release 2>&1 | tee ../flutter-build-aab.log

      - name: Prepare release assets
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        run: |
          set -euo pipefail

          release_dir="../release"
          laravel_staging="${release_dir}/laravel-shared-hosting"
          laravel_zip="${release_dir}/depass-laravel-shared-hosting-${GITHUB_RUN_NUMBER}.zip"
          apk_asset_prefix="${release_dir}/depass-mobile-${GITHUB_RUN_NUMBER}"

          rm -rf "${release_dir}"
          mkdir -p "${laravel_staging}"

          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi_name="$(basename "${apk}" .apk | sed 's/^app-//; s/-release$//')"
            cp "${apk}" "${apk_asset_prefix}-${abi_name}.apk"
          done

          cp -a ../backend/. "${laravel_staging}/"

          rm -rf \
            "${laravel_staging}/.env" \
            "${laravel_staging}/.phpunit.result.cache" \
            "${laravel_staging}/database/database.sqlite" \
            "${laravel_staging}/vendor" \
            "${laravel_staging}/node_modules" \
            "${laravel_staging}/storage/framework/cache/data/"* \
            "${laravel_staging}/storage/framework/testing/"* \
            "${laravel_staging}/storage/framework/views/"*.php \
            "${laravel_staging}/storage/logs/"*.log

          cat > "${laravel_staging}/index.php" <<'PHP'
          <?php

          use Illuminate\Foundation\Application;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists($maintenance = __DIR__.'/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          require __DIR__.'/vendor/autoload.php';

          /** @var Application $app */
          $app = require_once __DIR__.'/bootstrap/app.php';

          $app->handleRequest(Request::capture());
          PHP

          cat > "${laravel_staging}/.htaccess" <<'HTACCESS'
          <IfModule mod_rewrite.c>
              <IfModule mod_negotiation.c>
                  Options -MultiViews -Indexes
              </IfModule>

              RewriteEngine On

              RewriteRule ^(?:app|bootstrap|config|database|resources|routes|storage|tests|vendor)(?:/|$) - [F,L]
              RewriteRule ^(?:artisan|composer\.(?:json|lock)|package(?:-lock)?\.json|phpunit\.xml|vite\.config\.js)$ - [F,L]

              RewriteCond %{HTTP:Authorization} .
              RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

              RewriteCond %{HTTP:x-xsrf-token} .
              RewriteRule .* - [E=HTTP_X_XSRF_TOKEN:%{HTTP:X-XSRF-Token}]

              RewriteCond %{DOCUMENT_ROOT}/public%{REQUEST_URI} -f [OR]
              RewriteCond %{DOCUMENT_ROOT}/public%{REQUEST_URI} -d
              RewriteRule ^(.*)$ public/$1 [L]

              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteCond %{REQUEST_URI} (.+)/$
              RewriteRule ^ %1 [L,R=301]

              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteRule ^ index.php [L]
          </IfModule>

          <FilesMatch "^\.">
              Require all denied
          </FilesMatch>
          HTACCESS

          (
            cd "${laravel_staging}"
            zip -qr "../$(basename "${laravel_zip}")" .
          )

      - name: Debug failed Flutter build
        if: ${{ failure() }}
        run: |
          echo "Flutter diagnostics"
          flutter --version || true
          dart --version || true
          flutter doctor -v || true
          echo "pubspec.yaml"
          sed -n '1,220p' pubspec.yaml || true
          echo "Dependency tree"
          dart pub deps || true
          echo "Android output tree"
          find build/app/outputs -maxdepth 5 -type f 2>/dev/null | sort || true

      - name: Upload Flutter debug logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: flutter-debug-logs
          path: |
            flutter-create.log
            flutter-pub-get.log
            flutter-analyze.log
            flutter-test.log
            flutter-build-apk.log
            flutter-build-aab.log
          if-no-files-found: ignore

      - name: Upload split APKs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: depass-mobile-split-apks
          path: mobile/build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Upload App Bundle
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.build_type == 'appbundle' || inputs.build_type == 'both') }}
        uses: actions/upload-artifact@v4
        with:
          name: depass-mobile-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab

      - name: Publish GitHub release
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.build_type == 'apk' || inputs.build_type == 'both') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: depass-mobile-${{ github.run_number }}
          name: DePass Mobile Build ${{ github.run_number }}
          body: |
            Automated release created after seeded Laravel tests, Flutter analysis, Flutter tests, and split-per-ABI Android builds.

            Assets:
            - Android release APKs split per ABI
            - Tested Laravel source zip with root index.php and .htaccess for shared-hosting basedirs such as serv00.com
          files: |
            release/depass-mobile-${{ github.run_number }}-*.apk
            release/depass-laravel-shared-hosting-${{ github.run_number }}.zip
